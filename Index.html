<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SL News</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#0f172a;
  --accent:#2563eb;
  --bg:#f1f5f9;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:var(--bg);
  color:#111;
}

header{
  background:var(--primary);
  color:#fff;
  padding:1rem 2rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{margin:0;font-size:1.5rem}

nav a{
  color:#fff;
  margin-left:20px;
  text-decoration:none;
  font-weight:500;
  transition:.2s;
}
nav a:hover{color:#93c5fd}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.section{display:none}
.active{display:block}

.hero{
  background:linear-gradient(120deg,#1e293b,#2563eb);
  color:white;
  padding:60px 20px;
  border-radius:16px;
  margin-bottom:20px;
}

.hero h2{margin:0 0 10px}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:16px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  transition:.2s;
}

.card:hover{
  transform:translateY(-5px);
}

.card img{
  width:100%;
  border-radius:12px;
}

.card h3{margin:10px 0 5px}

button{
  background:var(--accent);
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

.admin-box{
  max-width:400px;
  margin:auto;
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

footer{
  text-align:center;
  padding:20px;
  color:#666;
}
</style>
</head>

<body>

<header>
<h1>SL News</h1>
<nav>
<a onclick="showPage('home')">Home</a>
<a onclick="showPage('blog')">News</a>
<a onclick="showPage('admin')">Admin</a>
</nav>
</header>

<div class="container">

<!-- HOME -->
<section id="home" class="section active">
<div class="hero">
<h2>Breaking News, Fast.</h2>
<p>Your source for the latest stories.</p>
</div>

<div class="grid" id="topStories">
<div class="card">
<img src="https://via.placeholder.com/400x200">
<h3>Welcome to SL News</h3>
<p>You can post news using the admin panel.</p>
</div>
</div>
</section>

<!-- BLOG -->
<section id="blog" class="section">
<h2>Latest News</h2>
<div class="grid" id="posts"></div>
</section>

<!-- ADMIN -->
<section id="admin" class="section">
<div class="admin-box">
<h2>Admin Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<div id="adminPanel" style="display:none;">
<hr>
<h3>Create Post</h3>
<input id="title" placeholder="Title">
<textarea id="content" placeholder="Content"></textarea>
<input id="image" placeholder="Image URL (optional)">
<button onclick="addPost()">Publish</button>
</div>
</div>
</section>

</div>

<footer>
<p>© 2026 SL News</p>
</footer>

<script>
function showPage(page){
 document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
 document.getElementById(page).classList.add('active');
}

// LOGIN
const ADMIN_USER = "admin";
const ADMIN_PASS = "1234";

function login(){
 let u=document.getElementById('user').value;
 let p=document.getElementById('pass').value;

 if(u===ADMIN_USER && p===ADMIN_PASS){
  document.getElementById('adminPanel').style.display='block';
  alert('Welcome admin');
 } else alert('Wrong login');
}

// POSTS STORAGE
let posts = JSON.parse(localStorage.getItem('posts')||'[]');

function addPost(){
 let title=document.getElementById('title').value;
 let content=document.getElementById('content').value;
 let image=document.getElementById('image').value || 'https://via.placeholder.com/400x200';

 let post={title,content,image};
 posts.unshift(post);
 localStorage.setItem('posts',JSON.stringify(posts));
 renderPosts();
 showPage('blog');
}

function renderPosts(){
 let container=document.getElementById('posts');
 container.innerHTML='';

 posts.forEach(p=>{
  container.innerHTML += `
  <div class="card">
    <img src="${p.image}">
    <h3>${p.title}</h3>
    <p>${p.content}</p>
  </div>`;
 });
}

renderPosts();
</script>

</body>
</html>
